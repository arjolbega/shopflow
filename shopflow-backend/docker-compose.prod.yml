version: "3.9"

services:
  # ── MySQL ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: shopflow_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - shopflow_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports exposed — only accessible inside Docker network
    # MySQL is not reachable from outside in production

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shopflow_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - shopflow_network
    # No ports exposed — internal only

  # ── Backend ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: shopflow_backend_prod
    restart: always
    env_file: .env.production
    environment:
      NODE_ENV: production
      DB_HOST: mysql # service name — Docker internal DNS
      REDIS_HOST: redis
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - shopflow_network

networks:
  shopflow_network:
    driver: bridge

volumes:
  mysql_data_prod:
